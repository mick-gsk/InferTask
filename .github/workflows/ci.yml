name: CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.js'
  pull_request:
    branches: [main]

# CI läuft nur wenn package-lock.json existiert (ab Phase 2)
jobs:
  check:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    # Nur ausführen wenn package-lock.json vorhanden
    if: hashFiles('package-lock.json') != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check
