name: CI

# CI ist ab Phase 2 aktiv (wenn package-lock.json existiert und npm install ausgeführt wurde)
# Bis dahin ist dieser Workflow deaktiviert um fehlerhafte Runs zu vermeiden

on:
  workflow_dispatch:

jobs:
  check:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check
