name: Bug
description: Etwas funktioniert nicht wie erwartet
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Was ist passiert?
      description: Kurze Beschreibung des Problems.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Schritte zum Reproduzieren
      placeholder: |
        1. index.html im Browser öffnen
        2. Task eingeben und Enter drücken
        3. Fehler erscheint in der Konsole
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
    validations:
      required: true

  - type: textarea
    id: affected
    attributes:
      label: Betroffene Datei(en)
      placeholder: "frontend/src/main.ts, Zeile ~42"
    validations:
      required: false
