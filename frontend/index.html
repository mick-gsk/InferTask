<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InferTask</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">InferTask</div>

      <button class="new-task-btn" id="open-modal-btn">+ Eintragen</button>

      <nav class="menu">
        <a href="#" class="menu-item active">Alle Aufgaben</a>
        <a href="#" class="menu-item">Heute</a>
        <a href="#" class="menu-item">Erledigt</a>
      </nav>

      <div class="list-block">
        <div class="list-title">Listen</div>
        <a href="#" class="list-item">Persönlich</a>
        <a href="#" class="list-item">Arbeit</a>
      </div>
    </aside>

    <!-- Hauptbereich -->
    <main class="content">
      <div class="page-header">
        <h1>Heute</h1>
        <p>Deine Aufgaben für heute</p>
      </div>

      <div class="task-panel">
        <!-- Schnelleingabe -->
        <div class="task-input-row">
          <input type="text" id="task-input" placeholder="Aufgabe hinzufügen…" autocomplete="off" />
          <button id="add-task-btn">Hinzufügen</button>
        </div>

        <!-- Offene Aufgaben -->
        <ul class="task-list" id="task-list"></ul>

        <!-- Erledigte Aufgaben -->
        <div class="completed-panel">
          <h3>Erledigt</h3>
          <ul class="task-list" id="completed-list"></ul>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal">
      <h2>Neue Aufgabe</h2>
      <label for="modal-title">Titel</label>
      <input type="text" id="modal-title" placeholder="Titel" />
      <label for="modal-desc">Beschreibung</label>
      <input type="text" id="modal-desc" placeholder="Beschreibung" />
      <div class="modal-actions">
        <button class="modal-cancel" id="modal-cancel">Abbrechen</button>
        <button class="modal-save" id="modal-save">Speichern</button>
      </div>
    </div>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
